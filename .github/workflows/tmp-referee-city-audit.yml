name: Temporary referee city audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tmp-referee-city-audit.yml'
      - 'tmp_referee_city_audit/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-visu:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check requests
      - run: python tmp_referee_city_audit/fetch_visu.py
      - uses: actions/upload-artifact@v4
        with:
          name: referee-city-audit-output
          path: referee-city-audit-output/
          if-no-files-found: error
          retention-days: 1
