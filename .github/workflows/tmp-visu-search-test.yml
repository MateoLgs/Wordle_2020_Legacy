name: Temporary Visu search test
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tmp-visu-search-test.yml'
      - 'tmp_referee_city_audit/test_search.py'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check requests
      - run: python tmp_referee_city_audit/test_search.py
      - uses: actions/upload-artifact@v4
        with:
          name: search-test-output
          path: search-test-output/
          retention-days: 1
